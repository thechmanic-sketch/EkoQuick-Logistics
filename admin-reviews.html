<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>html{background:#0B0F16}</style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekoquick — Reviews & Complaints</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="app.css">
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="support-widget.css">
    <script src="transitions.js"></script>
    <style>
        .drawer-backdrop {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            z-index: 20; display: none;
        }
        .drawer-backdrop.open { display: block; }
        .drawer {
            position: fixed; top: 0; right: 0; height: 100vh; width: min(560px, 100vw);
            background: var(--ink-2); border-left: 1px solid var(--line);
            z-index: 21; transform: translateX(100%); transition: transform 0.25s ease;
            overflow-y: auto; padding: 20px;
        }
        .drawer.open { transform: translateX(0); }
        .drawer-close { float: right; background: transparent; border: 1px solid var(--line); border-radius: 8px; color: var(--paper); width: 32px; height: 32px; cursor: pointer; }
        .drawer h3 { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted-dim); margin: 20px 0 8px; border-top: 1px solid var(--line); padding-top: 14px; }
        .drawer h3:first-of-type { border-top: none; padding-top: 0; }
        .kv-row { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; gap: 10px; }
        .kv-row span:first-child { color: var(--muted); }
        .cmd-tabs { display: flex; gap: 4px; margin-bottom: 16px; }
        .cmd-tab { padding: 8px 16px; background: var(--ink-2); border: 1px solid var(--line); color: var(--muted); cursor: pointer; font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.05em; text-transform: uppercase; }
        .cmd-tab.active { color: var(--orange); border-color: var(--orange); }
        .rating-bar-row { display: flex; align-items: center; gap: 10px; font-size: 13px; margin-bottom: 6px; }
        .rating-bar-track { flex: 1; height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
        .rating-bar-fill { height: 100%; background: var(--orange); }
        .timeline-item { display: flex; gap: 10px; font-size: 13px; padding: 6px 0; }
        .timeline-item .dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
        .timeline-item .dot.done { background: var(--green); }
        .timeline-item .dot.pending { background: var(--line); }
        .risk-pill { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
        .risk-low { background: rgba(30,142,62,0.15); color: #7FE39B; }
        .risk-medium { background: rgba(232,163,61,0.15); color: var(--amber); }
        .risk-high { background: rgba(217,48,37,0.15); color: #FF8A80; }
    </style>
</head>
<body>
    <div class="cmd-shell">
        <aside class="cmd-sidebar">
            <div class="cmd-brand">Eko<span>quick</span></div>
            <div class="cmd-tag">Admin Command Center</div>
            <nav class="cmd-nav">
                <a href="admin-dashboard.html">Dashboard</a>
                <a href="admin-drivers.html">Drivers</a>
                <a href="admin-reviews.html">Reviews & Complaints</a>
                <a href="admin-jobs.html">All Jobs</a>
                <a href="admin-fleet-map.html">Live Fleet Map</a>
                <a href="admin-dispatch.html">Dispatch Center</a>
                <a href="admin-customers.html">Customers</a>
                <a href="admin-finances.html">Finances</a>
                <a href="admin-commissions.html">Commissions</a>
                <a href="admin-chat.html">Communications</a>
                <a href="admin-broadcasts.html">Broadcasts</a>
                <a href="admin-settings.html">Settings</a>
            </nav>
            <div class="cmd-sidebar-bottom">
                <button class="nav-logout" id="logoutBtn" style="width: 100%;">Log Out</button>
            </div>
        </aside>

        <main class="cmd-main">
            <div class="cmd-header">
                <div class="cmd-header-title">
                    <h1>Reviews & Complaints</h1>
                    <div class="cmd-breadcrumb" id="headerLabel">Loading...</div>
                </div>
                <div class="cmd-header-right">
                    <button class="btn btn-outline-blue" id="refreshBtn" style="width: auto;">Refresh</button>
                </div>
            </div>

            <div class="cmd-tabs">
                <div class="cmd-tab active" data-tab="reviews">⭐ Reviews</div>
                <div class="cmd-tab" data-tab="complaints">⚠ Complaints</div>
            </div>

            <div id="reviewsTab">
                <div id="reviewSummaryCards" class="kpi-grid">
                    <div class="skeleton" style="height:80px;"></div>
                </div>

                <div class="cmd-panel">
                    <h2>Rating Breakdown</h2>
                    <div id="ratingBreakdown"></div>
                </div>

                <div class="cmd-panel">
                    <div style="display:flex; gap:8px; margin-bottom: 12px; flex-wrap: wrap;">
                        <input class="field-plain" id="reviewSearch" placeholder="Search driver or customer..." style="flex:1; min-width:180px;">
                        <select class="field-plain" id="reviewSortBy" style="width:auto;">
                            <option value="dateDesc">Sort: Newest</option>
                            <option value="dateAsc">Sort: Oldest</option>
                            <option value="ratingAsc">Sort: Rating (low first)</option>
                            <option value="ratingDesc">Sort: Rating (high first)</option>
                        </select>
                    </div>
                    <div id="reviewsList"><div class="empty">Loading...</div></div>
                </div>
            </div>

            <div id="complaintsTab" class="hidden">
                <div id="complaintSummaryCards" class="kpi-grid">
                    <div class="skeleton" style="height:80px;"></div>
                </div>

                <div class="cmd-panel">
                    <div style="display:flex; gap:8px; margin-bottom: 12px; flex-wrap: wrap; align-items:center;">
                        <select class="field-plain" id="statusFilter" style="width:auto;">
                            <option value="">All statuses</option>
                            <option value="open">Open</option>
                            <option value="investigating">Under Investigation</option>
                            <option value="resolved">Resolved</option>
                            <option value="dismissed">Dismissed</option>
                        </select>
                        <select class="field-plain" id="priorityFilter" style="width:auto;">
                            <option value="">All priorities</option>
                            <option value="high">High</option>
                            <option value="medium">Medium</option>
                            <option value="low">Low</option>
                        </select>
                        <button class="btn btn-blue" id="newComplaintBtn" style="width:auto; margin-left:auto;">+ New Complaint</button>
                    </div>
                    <div id="complaintsTableWrap"><div class="empty">Loading...</div></div>
                </div>
            </div>
        </main>
    </div>

    <div class="drawer-backdrop" id="drawerBackdrop"></div>
    <div class="drawer" id="complaintDrawer"></div>

    <script src="vendor/supabase.js"></script>
    <script src="config.js"></script>
    <script src="admin-reviews.js"></script>
    <script src="support-widget.js"></script>
</body>
</html>
