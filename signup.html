<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekoquick — Sign Up</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="support-widget.css">
</head>
<body>
    <div class="hero-bg-wrap">
        <img class="hero-bg" src="hero.png" alt="">
        <div class="hero-overlay"></div>
    </div>
    <div class="auth-wrap">
        <a class="auth-logo-link" href="index.html">
            <span class="logo">Eko<span>quick</span></span>
            <span class="auth-logo-tag">KZN</span>
        </a>
        <a class="auth-topbar blue" href="login.html">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
            <span>Sign Up</span>
        </a>
        <div class="auth-card">
            <div class="auth-icon auth-icon-blue">
                <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M22 11h-6"/></svg>
            </div>
            <h1>Create Account</h1>
            <p class="auth-subtitle">Fill in the details below to create your account.</p>

            <form id="signupForm">
                <label class="field">
                    <svg class="field-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <input type="text" id="fullName" placeholder="Full Name" required>
                </label>
                <label class="field">
                    <svg class="field-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <input type="text" id="username" placeholder="Username" autocomplete="username" required>
                </label>
                <label class="field">
                    <svg class="field-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 6 10 7 10-7"/></svg>
                    <input type="email" id="email" placeholder="Email" autocomplete="email" required>
                </label>
                <label class="field">
                    <svg class="field-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    <input type="password" id="password" placeholder="Password" autocomplete="new-password" required>
                    <button type="button" class="field-toggle" aria-label="Show password">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </label>
                <label class="field">
                    <svg class="field-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    <input type="password" id="confirmPassword" placeholder="Confirm Password" autocomplete="new-password" required>
                    <button type="button" class="field-toggle" aria-label="Show password">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </label>

                <button type="submit" class="btn btn-blue">Sign Up</button>
            </form>

            <div style="margin-top: 14px; font-size: 13px;">Already have an account? <a class="auth-link" style="display: inline; margin: 0;" href="login.html">Login</a></div>
        </div>

        <div class="auth-footer auth-footer-light">
            <div>© 2026 Ekoquick</div>
            <div>This is a product of Techmanic Software and Digital Solutions</div>
        </div>
    </div>

    <script src="vendor/supabase.js"></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="support-widget.js"></script>
</body>
</html>
