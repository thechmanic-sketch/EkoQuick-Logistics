<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>html{background:#0B0F16}</style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekoquick — Reviews</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="app.css">
    <link rel="stylesheet" href="support-widget.css">
    <script src="transitions.js"></script>
    <script src="notif-sound.js"></script>
    <script src="notif-bell.js"></script>
    <script src="app-nav.js"></script>
    <style>
        .review-card { background: rgba(255,255,255,0.04); border: 1px solid var(--line); border-radius: 12px; padding: 14px; margin-top: 10px; }
        .review-card img.avatar { width:40px; height:40px; border-radius:50%; object-fit:cover; border:1px solid var(--line); }
        .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
        .filter-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--line); color: #fff; border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 13px; }
        .filter-btn.active { background: var(--blue, #3E8BFF); border-color: var(--blue, #3E8BFF); }
        table.review-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        table.review-table th, table.review-table td { padding: 8px 6px; border-bottom: 1px solid var(--line); text-align: left; white-space: nowrap; }
        .table-scroll { overflow-x: auto; }
    </style>
</head>
<body>
    <div class="navbar">
        <a class="brand" style="color:#fff; text-decoration:none;" href="dashboard.html">← Eko<span>quick</span></a>
    </div>

    <div class="page-wrap">
        <div class="card">
            <h1>Reviews</h1>
            <input class="field-plain" id="reviewSearch" placeholder="Search by Order ID or driver name...">
            <div class="filter-row" id="starFilters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="5">5 Stars</button>
                <button class="filter-btn" data-filter="4">4 Stars</button>
                <button class="filter-btn" data-filter="3">3 Stars</button>
                <button class="filter-btn" data-filter="2">2 Stars</button>
                <button class="filter-btn" data-filter="1">1 Star</button>
            </div>
        </div>

        <div class="card">
            <div class="summary-cards" id="summaryCards"></div>
        </div>

        <div class="card">
            <h2>Pending Reviews</h2>
            <div id="pendingList"></div>
            <div class="empty hidden" id="pendingEmpty">No completed deliveries awaiting review.</div>
        </div>

        <div class="card">
            <h2>Review History</h2>
            <div class="table-scroll">
                <table class="review-table">
                    <thead><tr><th>Order ID</th><th>Driver</th><th>Rating</th><th>Review Date</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody id="historyBody"></tbody>
                </table>
            </div>
            <div class="empty hidden" id="historyEmpty">
                No reviews submitted yet.
                <div style="margin-top:8px;">Your completed deliveries can be reviewed here.</div>
            </div>
        </div>
    </div>

    <script src="vendor/supabase.js"></script>
    <script src="config.js"></script>
    <script src="reviews.js"></script>
    <script src="support-widget.js"></script>
</body>
</html>
