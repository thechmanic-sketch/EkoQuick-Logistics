<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>html{background:#0B0F16}</style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekoquick — Need Help</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="app.css">
    <script src="transitions.js"></script>
    <style>
        html, body { height: 100%; margin: 0; }
        .chat-wrap { display: flex; flex-direction: column; height: 100vh; max-width: 680px; margin: 0 auto; background: var(--ink); }
        .chat-top { background: var(--ink-2); border-bottom: 1px solid var(--line); padding: 10px 14px; display: flex; align-items: center; gap: 10px; }
        .chat-top a.back { color: #fff; text-decoration: none; font-size: 18px; }
        #messageArea { flex: 1; overflow-y: auto; padding: 10px 14px; }
        .msg-row { display: flex; margin: 4px 0; }
        .msg-row.mine { justify-content: flex-end; }
        .msg-row.system { justify-content: center; }
        .bubble { max-width: 78%; border-radius: 12px; padding: 8px 10px; font-size: 13px; }
        .msg-row.mine .bubble { background: var(--blue,#3E8BFF); }
        .msg-row:not(.mine):not(.system) .bubble { background: rgba(255,255,255,0.08); }
        .msg-row.system .bubble { background: rgba(255,255,255,0.05); color: var(--muted); font-size: 11px; }
        .msg-meta { font-size: 10px; opacity: 0.7; margin-top: 3px; }
        .chat-bottom { background: var(--ink-2); border-top: 1px solid var(--line); padding: 8px 10px; }
        .input-row { display: flex; gap: 8px; }
        .input-row input { flex: 1; background: rgba(255,255,255,0.06); border: 1px solid var(--line); border-radius: 20px; padding: 9px 14px; color: #fff; }
        .send-btn { background: var(--blue,#3E8BFF); border: none; color: #fff; border-radius: 50%; width: 38px; height: 38px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="chat-wrap">
        <div class="chat-top">
            <a class="back" href="driver-dashboard.html" id="backBtn">←</a>
            <div>
                <div style="font-weight:600;">Need Help — Admin Support</div>
                <div class="meta" id="statusLine"></div>
            </div>
        </div>
        <div id="messageArea"></div>
        <div class="chat-bottom">
            <div class="input-row">
                <input type="text" id="messageInput" placeholder="Describe the issue...">
                <button class="send-btn" id="sendBtn">➤</button>
            </div>
        </div>
    </div>

    <script src="vendor/supabase.js"></script>
    <script src="config.js"></script>
    <script src="driver-admin-chat.js"></script>
</body>
</html>
