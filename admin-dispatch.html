<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>html{background:#0B0F16}</style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekoquick — Dispatch Center</title>
    <link rel="stylesheet" href="vendor/leaflet.css">
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="app.css">
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="support-widget.css">
    <script src="transitions.js"></script>
    <style>
        .dispatch-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1.2fr;
            gap: 16px;
            align-items: start;
        }
        @media (max-width: 1100px) {
            .dispatch-grid { grid-template-columns: 1fr; }
        }
        .dispatch-job.selected { border-color: var(--orange); }
    </style>
</head>
<body>
    <div class="cmd-shell">
        <aside class="cmd-sidebar">
            <div class="cmd-brand">Eko<span>quick</span></div>
            <div class="cmd-tag">Admin Command Center</div>
            <nav class="cmd-nav">
                <a href="admin-dashboard.html#overview">Overview</a>
                <a href="admin-dashboard.html#fleet">Fleet Map</a>
                <a href="admin-dashboard.html#drivers">Drivers</a>
                <a href="admin-dashboard.html#reviews">Reviews & Complaints</a>
                <a href="admin-dashboard.html#jobs">All Jobs</a>
                <a href="admin-dispatch.html">Dispatch Center</a>
                <a href="admin-customers.html">Customers</a>
                <a href="admin-finances.html">Finances</a>
                <a href="admin-commissions.html">Commissions</a>
            </nav>
            <div class="cmd-sidebar-bottom">
                <button class="nav-logout" id="logoutBtn" style="width: 100%;">Log Out</button>
            </div>
        </aside>

        <main class="cmd-main">
            <div class="dispatch-grid">
                <div class="cmd-panel">
                    <h2>Unassigned Orders</h2>
                    <div id="unassignedList" class="cmd-panel-scroll" style="max-height: 640px;"><div class="empty">Loading...</div></div>
                </div>

                <div class="cmd-panel">
                    <h2>Nearby Drivers</h2>
                    <div id="nearbyDrivers" class="cmd-panel-scroll" style="max-height: 640px;"><div class="empty">Select an order to see matching drivers.</div></div>
                </div>

                <div class="cmd-panel">
                    <h2>Map</h2>
                    <div id="dispatchMap" style="height: 500px; border: 1px solid var(--line);"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="vendor/leaflet.js"></script>
    <script src="vendor/supabase.js"></script>
    <script src="config.js"></script>
    <script src="admin-dispatch.js"></script>
    <script src="support-widget.js"></script>
</body>
</html>
