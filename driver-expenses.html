<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>html{background:#0B0F16}</style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekoquick — Expenses</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="app.css">
    <link rel="stylesheet" href="support-widget.css">
    <script src="transitions.js"></script>
    <script src="notif-sound.js"></script>
    <script src="notif-bell.js"></script>
    <script src="app-nav.js"></script>
    <style>
        table.exp-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        table.exp-table th, table.exp-table td { padding: 8px 6px; border-bottom: 1px solid var(--line); text-align: left; white-space: nowrap; }
        .table-scroll { overflow-x: auto; }
    </style>
</head>
<body>
    <div class="navbar">
        <a class="brand" style="color:#fff; text-decoration:none;" href="driver-dashboard.html">← Eko<span>quick</span> Driver</a>
    </div>

    <div class="page-wrap">
        <div class="card">
            <h1>Expenses</h1>
        </div>

        <div class="card">
            <h2>Log an Expense</h2>
            <label>Category</label>
            <select class="field-plain" id="fCategory">
                <option value="fuel">Fuel</option>
                <option value="repairs">Repairs</option>
                <option value="parking">Parking</option>
                <option value="tolls">Tolls</option>
                <option value="maintenance">Maintenance</option>
                <option value="other">Other Expenses</option>
            </select>
            <label>Amount (R)</label>
            <input class="field-plain" type="number" step="0.01" id="fAmount">
            <label>Date</label>
            <input class="field-plain" type="date" id="fDate">
            <label>Notes (optional)</label>
            <input class="field-plain" id="fNotes">
            <button class="btn btn-blue" id="addExpenseBtn" style="margin-top:8px;">Add Expense</button>
            <div class="meta" id="addMsg"></div>
        </div>

        <div class="card">
            <div class="summary-cards" id="summaryCards"></div>
        </div>

        <div class="card">
            <h2>Monthly Summary</h2>
            <div class="meta" id="monthlySummary"></div>
        </div>

        <div class="card">
            <h2>Expense History</h2>
            <div class="table-scroll">
                <table class="exp-table">
                    <thead><tr><th>Date</th><th>Category</th><th>Amount</th><th>Notes</th><th>Actions</th></tr></thead>
                    <tbody id="expenseBody"></tbody>
                </table>
            </div>
            <div class="empty hidden" id="emptyState">No expenses logged yet.</div>
        </div>
    </div>

    <script src="vendor/supabase.js"></script>
    <script src="config.js"></script>
    <script src="driver-expenses.js"></script>
    <script src="support-widget.js"></script>
</body>
</html>
