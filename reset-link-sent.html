<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekoquick — Reset Link Sent</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-wrap">
        <a class="auth-topbar orange" href="forgot-password.html">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
            <span>Reset Link Sent</span>
        </a>
        <div class="auth-card">
            <div class="auth-icon auth-icon-orange">
                <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 6 10 7 10-7"/></svg>
            </div>
            <h1>Reset Link Sent!</h1>
            <p class="auth-subtitle">We've sent a password reset link to your registered email address. Please check your inbox and follow the instructions.</p>

            <a class="btn btn-orange" href="login.html">Back to Login</a>
        </div>

        <div class="auth-footer">
            <div>© 2026 Ekoquick</div>
            <div>This is a product of Techmanic Software and Digital Solutions</div>
        </div>
    </div>
</body>
</html>
