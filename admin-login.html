<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekoquick — Admin Login</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="support-widget.css">
    <script src="transitions.js"></script>
</head>
<body>
    <div class="hero-bg-wrap">
        <img class="hero-bg" src="hero.png" alt="">
        <div class="hero-overlay"></div>
    </div>
    <div class="auth-wrap">
        <a class="auth-logo-link" href="index.html">
            <span class="logo">Eko<span>quick</span></span>
            <span class="auth-logo-tag">KZN</span>
        </a>
        <a class="auth-topbar blue" href="login.html">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
            <span>Admin Login</span>
        </a>
        <div class="auth-card">
            <div class="auth-icon auth-icon-blue">
                <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/></svg>
            </div>
            <h1>Admin Login</h1>
            <p class="auth-subtitle">Enter your credentials to access the admin panel</p>

            <form id="adminLoginForm">
                <label class="field">
                    <svg class="field-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <input type="text" id="username" placeholder="Username" autocomplete="username" required>
                </label>
                <label class="field">
                    <svg class="field-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
                    <button type="button" class="field-toggle" data-toggle-for="password" aria-label="Show password">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </label>

                <button type="submit" class="btn btn-blue">Login</button>
            </form>

            <a class="auth-link" href="forgot-password.html">Forgot password?</a>
        </div>

        <div class="auth-footer auth-footer-light">
            <div>© 2026 Ekoquick</div>
            <div>This is a product of Techmanic Software and Digital Solutions</div>
        </div>
    </div>

    <script src="vendor/supabase.js"></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="support-widget.js"></script>
</body>
</html>
