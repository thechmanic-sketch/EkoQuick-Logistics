<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>html{background:#0B0F16}</style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekoquick — Active Deliveries</title>
    <link rel="stylesheet" href="vendor/leaflet.css">
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="app.css">
    <link rel="stylesheet" href="support-widget.css">
    <script src="transitions.js"></script>
    <style>
        .job-card { background: rgba(255,255,255,0.04); border: 1px solid var(--line); border-radius: 12px; padding: 14px; margin-top: 10px; }
        .details-row { display: none; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--line); font-size: 12px; color: var(--muted); }
        .details-row.open { display: block; }
        .details-row h4 { color: #fff; margin: 10px 0 4px; font-size: 13px; }
        .timeline { list-style: none; margin: 0; padding: 0; }
        .timeline li { padding: 6px 0 6px 18px; border-left: 2px solid var(--line); position: relative; }
        .timeline li:last-child { border-left-color: transparent; }
        .timeline li::before { content: ''; position: absolute; left: -6px; top: 10px; width: 9px; height: 9px; border-radius: 50%; background: var(--line); }
        .timeline li.done::before { background: var(--blue,#3E8BFF); }
        .emergency-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
        .emergency-btn { background: #C0392B; color: #fff; border: none; border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>
    <div class="navbar">
        <a class="brand" style="color:#fff; text-decoration:none;" href="driver-dashboard.html">← Eko<span>quick</span> Driver</a>
    </div>

    <div class="page-wrap">
        <div class="card">
            <h1>Active Deliveries</h1>
            <div class="meta" id="onlineStatusLine"></div>
            <button class="btn btn-outline-blue" id="refreshBtn" style="margin-top:8px;">Refresh</button>
        </div>

        <div class="card">
            <div class="summary-cards" id="summaryCards"></div>
        </div>

        <div class="card">
            <div id="jobList"></div>
            <div class="empty hidden" id="emptyState">You have no deliveries in progress.</div>
        </div>
    </div>

    <script src="vendor/leaflet.js"></script>
    <script src="vendor/supabase.js"></script>
    <script src="config.js"></script>
    <script src="driver-active-deliveries.js"></script>
    <script src="support-widget.js"></script>
</body>
</html>
