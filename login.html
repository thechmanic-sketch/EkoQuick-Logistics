<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekoquick — Log In</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-wrap">
        <div class="auth-card">
            <div class="auth-icon auth-icon-blue">
                <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <h1>Login As</h1>
            <p class="auth-subtitle">Select your role to continue</p>

            <div class="role-grid">
                <a class="role-tile" href="admin-login.html" data-role="admin">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/></svg>
                    <span>Admin</span>
                </a>
                <a class="role-tile" href="driver-login.html" data-role="driver">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17h1a2 2 0 0 0 4 0h6a2 2 0 0 0 4 0h1a1 1 0 0 0 1-1v-3.5a1 1 0 0 0-.29-.71L17 9h-3V6a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1Z"/><circle cx="7.5" cy="17.5" r="1.5"/><circle cx="17.5" cy="17.5" r="1.5"/></svg>
                    <span>Driver</span>
                </a>
                <button type="button" class="role-tile role-tile-selected" data-role="customer">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    <span>Customer</span>
                </button>
            </div>

            <div class="auth-divider"><span>OR</span></div>

            <form id="customerLoginForm">
                <label class="field">
                    <svg class="field-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <input type="text" id="username" placeholder="Username" autocomplete="username" required>
                </label>
                <label class="field">
                    <svg class="field-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
                    <button type="button" class="field-toggle" id="togglePassword" aria-label="Show password">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </label>

                <button type="submit" class="btn btn-blue">Login</button>
            </form>

            <a class="auth-link" href="forgot-password.html">Forgot password?</a>

            <div class="auth-divider"><span>OR</span></div>

            <a class="btn btn-outline-blue" href="signup.html">Sign Up</a>
        </div>

        <div class="auth-footer">
            <div>© 2026 Ekoquick</div>
            <div>This is a product of Techmanic Software and Digital Solutions</div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
