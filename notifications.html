<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>html{background:#0B0F16}</style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekoquick — Notifications</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="app.css">
    <script src="transitions.js"></script>
    <script src="app-nav.js"></script>
    <style>
        .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
        .filter-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--line); color: #fff; border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 13px; }
        .filter-btn.active { background: var(--blue, #3E8BFF); border-color: var(--blue, #3E8BFF); }
        .notif-row { display: flex; gap: 10px; padding: 10px 4px; border-bottom: 1px solid var(--line); cursor: pointer; }
        .notif-row:hover { background: rgba(255,255,255,0.04); }
        .notif-row.unread { background: rgba(62,139,255,0.06); }
        .notif-row .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--orange); flex-shrink: 0; margin-top: 6px; }
        .notif-row .dot.read { background: transparent; }
        .notif-row .body { flex: 1; min-width: 0; }
        .notif-row .title { font-weight: 600; font-size: 13px; }
        .notif-row .msg { font-size: 12px; color: var(--muted); }
        .notif-row .time { font-size: 11px; color: var(--muted-dim); margin-top: 2px; }
        .priority-tag { font-size: 10px; padding: 1px 6px; border-radius: 8px; margin-left: 6px; }
        .priority-tag.high, .priority-tag.urgent { background: rgba(217,48,37,0.15); color: #FF8A80; }
    </style>
</head>
<body>
    <div class="navbar">
        <a class="brand" style="color:#fff; text-decoration:none;" id="backLink" href="dashboard.html">← Eko<span>quick</span></a>
    </div>

    <div class="page-wrap">
        <div class="card">
            <h1>Notifications</h1>
            <div class="filter-row" id="typeFilters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="delivery_update">Delivery Updates</button>
                <button class="filter-btn" data-filter="payment">Payments</button>
                <button class="filter-btn" data-filter="chat_message">Messages</button>
                <button class="filter-btn" data-filter="unread">Unread</button>
            </div>
            <button class="btn btn-outline-blue" id="markAllReadBtn" style="width:auto;">Mark all as read</button>
        </div>

        <div class="card">
            <div id="notifList"></div>
            <div class="empty hidden" id="emptyState">No notifications yet.</div>
        </div>

        <div class="card">
            <h2>Preferences</h2>
            <label style="display:flex; align-items:center; gap:8px;"><input type="checkbox" id="pPush" style="width:auto;"> Push notifications</label>
            <label style="display:flex; align-items:center; gap:8px;"><input type="checkbox" id="pSound" style="width:auto;"> Sound</label>
            <label style="display:flex; align-items:center; gap:8px;"><input type="checkbox" id="pVibration" style="width:auto;"> Vibration</label>
            <div id="eventTogglesWrap" style="margin-top:10px;"></div>
            <button class="btn btn-blue" id="savePrefsBtn" style="margin-top:8px;">Save</button>
            <div class="meta" id="prefsMsg" style="margin-top:6px;">Push notifications aren't actually connected to any provider yet — this only controls what's shown here and in the in-app bell.</div>
        </div>
    </div>

    <script src="vendor/supabase.js"></script>
    <script src="config.js"></script>
    <script src="notifications.js"></script>
</body>
</html>
