<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekoquick — Reset Password</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="support-widget.css">
</head>
<body>
    <div class="auth-wrap">
        <a class="auth-logo-link" href="index.html">
            <span class="logo">Eko<span>quick</span></span>
            <span class="auth-logo-tag">KZN</span>
        </a>
        <a class="auth-topbar orange" href="login.html">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
            <span>Reset Password</span>
        </a>
        <div class="auth-card">
            <div class="auth-icon auth-icon-orange">
                <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <h1>Create New Password</h1>
            <p class="auth-subtitle">Enter your new password below.</p>

            <form id="resetPasswordForm">
                <label class="field">
                    <svg class="field-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    <input type="password" id="newPassword" placeholder="New Password" autocomplete="new-password" required>
                    <button type="button" class="field-toggle" aria-label="Show password">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </label>
                <label class="field">
                    <svg class="field-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    <input type="password" id="confirmNewPassword" placeholder="Confirm New Password" autocomplete="new-password" required>
                    <button type="button" class="field-toggle" aria-label="Show password">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </label>

                <button type="submit" class="btn btn-orange">Reset Password</button>
            </form>

            <a class="auth-link" href="login.html">Back to Login</a>
        </div>

        <div class="auth-footer">
            <div>© 2026 Ekoquick</div>
            <div>This is a product of Techmanic Software and Digital Solutions</div>
        </div>
    </div>

    <script src="vendor/supabase.js"></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="support-widget.js"></script>
</body>
</html>
