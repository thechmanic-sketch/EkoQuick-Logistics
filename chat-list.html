<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>html{background:#0B0F16}</style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekoquick — Chats</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="app.css">
    <script src="transitions.js"></script>
    <style>
        .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
        .filter-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--line); color: #fff; border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 13px; }
        .filter-btn.active { background: var(--blue, #3E8BFF); border-color: var(--blue, #3E8BFF); }
        .section-label { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted-dim); margin: 14px 0 6px; }
        .chat-row { display: flex; align-items: center; gap: 10px; padding: 10px 4px; border-bottom: 1px solid var(--line); cursor: pointer; }
        .chat-row:hover { background: rgba(255,255,255,0.04); }
        .chat-row img { width: 46px; height: 46px; border-radius: 50%; object-fit: cover; border: 1px solid var(--line); flex-shrink: 0; }
        .chat-row .body { flex: 1; min-width: 0; }
        .chat-row .top-line { display: flex; justify-content: space-between; gap: 8px; }
        .chat-row .name { font-weight: 600; font-size: 14px; }
        .chat-row .date { font-size: 11px; color: var(--muted); flex-shrink: 0; }
        .chat-row .bottom-line { display: flex; justify-content: space-between; gap: 8px; align-items: center; margin-top: 2px; }
        .chat-row .last-msg { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .chat-row .delivery-tag { font-size: 11px; color: var(--muted-dim); }
        .unread-badge { background: var(--orange); color: #1a1a1a; font-size: 11px; font-weight: 700; border-radius: 10px; min-width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; padding: 0 5px; }
    </style>
</head>
<body>
    <div class="navbar">
        <a class="brand" style="color:#fff; text-decoration:none;" id="backLink" href="dashboard.html">← Eko<span>quick</span></a>
    </div>

    <div class="page-wrap">
        <div class="card">
            <h1>Chats</h1>
            <input class="field-plain" id="chatSearch" placeholder="Search by name, delivery number, message or date...">
            <div class="filter-row">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="history">History</button>
                <button class="filter-btn" data-filter="archived">Archived</button>
            </div>
        </div>

        <div class="card">
            <div id="activeSection">
                <div class="section-label hidden" id="activeLabel">Active</div>
                <div id="activeList"></div>
            </div>
            <div id="historySection">
                <div class="section-label hidden" id="historyLabel">History</div>
                <div id="historyList"></div>
            </div>
            <div class="empty hidden" id="emptyState">No conversations yet.</div>
        </div>
    </div>

    <script src="vendor/supabase.js"></script>
    <script src="config.js"></script>
    <script src="chat-list.js"></script>
</body>
</html>
