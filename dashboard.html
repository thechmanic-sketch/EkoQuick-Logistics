<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>html{background:#0B0F16}</style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekoquick — Dashboard</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="app.css">
    <link rel="stylesheet" href="support-widget.css">
    <script src="transitions.js"></script>
</head>
<body>
    <div class="navbar">
        <div class="brand">Eko<span>quick</span></div>
        <button class="nav-logout" id="logoutBtn">Log Out</button>
    </div>

    <div class="page-wrap">
        <div class="card">
            <h2 id="welcomeText">Welcome back!</h2>
            <div style="display:flex; align-items:center; gap:12px; margin-bottom: 12px;">
                <img id="avatarPreview" class="hidden" style="width:56px; height:56px; object-fit:cover; border:1px solid var(--line);">
                <div style="flex:1;">
                    <input class="field-plain" type="file" id="avatarFile" accept="image/*">
                </div>
                <button class="btn btn-outline-blue" id="avatarSaveBtn" style="width:auto;">Save photo</button>
            </div>
            <a class="btn btn-blue" href="new-delivery.html">+ New Delivery</a>
        </div>

        <div class="card">
            <h2>My Deliveries</h2>
            <div id="jobsList"><div class="empty">Loading...</div></div>
        </div>
    </div>

    <script src="vendor/supabase.js"></script>
    <script src="config.js"></script>
    <script src="dashboard.js"></script>
    <script src="support-widget.js"></script>
</body>
</html>
