<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekoquick</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        }
        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            background: url('hero.png') center center / cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
        }
        .hero h1 {
            position: relative;
            z-index: 1;
            font-size: 48px;
            color: #ffffff;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>ekoquick</h1>
    </div>
</body>
</html>
