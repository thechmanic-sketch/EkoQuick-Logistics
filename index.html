<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekoquick — KZN Delivery</title>
    <link rel="stylesheet" href="vendor/leaflet.css">
    <style>
        :root {
            --blue: #1E3A5F;
            --orange: #FF6B35;
            --gray-100: #F4F5F7;
            --gray-200: #E3E5E8;
            --gray-400: #9AA0A6;
            --gray-600: #4A4F55;
            --red: #D93025;
            --green: #1E8E3E;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background: var(--gray-100);
            color: #202124;
        }
        header {
            background: var(--blue);
            color: white;
            padding: 20px;
            text-align: center;
        }
        header h1 { margin: 0; font-size: 22px; }
        header p { margin: 4px 0 0; font-size: 13px; opacity: 0.8; }
        .wrap { max-width: 480px; margin: 0 auto; padding: 16px; }
        .card {
            background: white;
            border: 1px solid var(--gray-200);
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 14px;
        }
        .card h2 { margin: 0 0 12px; font-size: 15px; color: var(--gray-600); }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: var(--gray-600); }
        input, select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--gray-200);
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 12px;
            font-family: inherit;
        }
        input:focus, select:focus { outline: 2px solid var(--blue); }
        button {
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            border: none;
            padding: 10px 16px;
            cursor: pointer;
        }
        .btn-primary { background: var(--orange); color: white; width: 100%; }
        .btn-secondary { background: var(--blue); color: white; width: 100%; margin-top: 8px; }
        .btn-outline { background: white; border: 1px solid var(--gray-200); color: var(--gray-600); }
        .btn-tab { flex: 1; background: var(--gray-100); color: var(--gray-600); }
        .btn-tab.active { background: var(--blue); color: white; }
        .row { display: flex; gap: 8px; }
        .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
        .vopt {
            border: 2px solid var(--gray-200);
            border-radius: 8px;
            padding: 10px 4px;
            text-align: center;
            cursor: pointer;
            font-size: 12px;
        }
        .vopt.selected { border-color: var(--orange); background: #FFF3EE; }
        .vopt .icon { font-size: 22px; display: block; }
        .msg { padding: 10px 12px; border-radius: 6px; font-size: 13px; margin-bottom: 10px; }
        .msg.error { background: #FCE8E8; color: var(--red); }
        .msg.success { background: #E6F4EA; color: var(--green); }
        .quote { text-align: center; background: var(--orange); color: white; padding: 20px; border-radius: 8px; margin: 14px 0; }
        .quote .amt { font-size: 36px; font-weight: 700; }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .badge.pending { background: #FFF0EB; color: var(--orange); }
        .badge.assigned { background: #E8F0FE; color: var(--blue); }
        .badge.in_progress { background: #FFF4CE; color: #8A6D00; }
        .badge.delivered { background: #E6F4EA; color: var(--green); }
        .job { border: 1px solid var(--gray-200); border-radius: 8px; padding: 12px; margin-bottom: 10px; }
        .job .route { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
        .job .meta { font-size: 12px; color: var(--gray-400); margin-bottom: 8px; }
        .navbar { display: flex; justify-content: space-between; align-items: center; max-width: 480px; margin: 0 auto; padding: 10px 16px 0; }
        .navbar .who { font-size: 13px; color: var(--gray-600); }
        .empty { text-align: center; color: var(--gray-400); font-size: 13px; padding: 14px 0; }
        #trackMap { height: 200px; border-radius: 8px; margin-top: 10px; }
        .driver-marker { font-size: 22px; text-align: center; line-height: 28px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="vendor/react.production.min.js"></script>
    <script src="vendor/react-dom.production.min.js"></script>
    <script src="vendor/supabase.js"></script>
    <script src="vendor/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
