<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>html{background:#0B0F16}</style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekoquick — My Orders</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="app.css">
    <link rel="stylesheet" href="support-widget.css">
    <script src="transitions.js"></script>
    <script src="notif-sound.js"></script>
    <script src="notif-bell.js"></script>
    <script src="app-nav.js"></script>
    <style>
        table.orders-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        table.orders-table th, table.orders-table td { padding: 8px 6px; border-bottom: 1px solid var(--line); text-align: left; white-space: nowrap; }
        table.orders-table th { color: var(--muted); font-weight: 600; position: sticky; top: 0; background: #11151d; }
        .table-scroll { overflow-x: auto; }
        .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
        .filter-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--line); color: #fff; border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 13px; }
        .filter-btn.active { background: var(--blue, #3E8BFF); border-color: var(--blue, #3E8BFF); }
        .details-row { display: none; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--line); font-size: 12px; color: var(--muted); }
        .details-row.open { display: block; }
        .details-row h4 { color: #fff; margin: 10px 0 4px; font-size: 13px; }
        .details-row h4:first-child { margin-top: 0; }
        .complaint-form { display: none; margin-top: 8px; }
        .complaint-form.open { display: block; }
    </style>
</head>
<body>
    <div class="navbar">
        <a class="brand" style="color:#fff; text-decoration:none;" href="dashboard.html">← Eko<span>quick</span></a>
    </div>

    <div class="page-wrap">
        <div class="card">
            <h1>My Orders</h1>
            <input class="field-plain" id="orderSearch" placeholder="Search by Order ID, pickup or drop-off address...">
            <div class="filter-row" id="statusFilters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="delivered">Completed</button>
                <button class="filter-btn" data-filter="cancelled">Cancelled</button>
            </div>
            <div class="filter-row">
                <label class="meta">From <input type="date" class="field-plain" id="dateFrom" style="width:auto;"></label>
                <label class="meta">To <input type="date" class="field-plain" id="dateTo" style="width:auto;"></label>
            </div>
        </div>

        <div class="card">
            <div class="summary-cards" id="summaryCards"></div>
        </div>

        <div class="card">
            <div class="table-scroll">
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>Order ID</th><th>Pickup</th><th>Drop-off</th><th>Driver</th>
                            <th>Vehicle</th><th>Status</th><th>Fee</th><th>Created</th><th>Delivered</th><th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="ordersBody"></tbody>
                </table>
            </div>
            <div class="empty hidden" id="emptyState">
                No orders found.
                <div style="margin-top:8px;">Book your first delivery.</div>
                <a class="btn btn-blue" href="new-delivery.html" style="display:block; text-align:center; margin-top:10px;">Book Delivery</a>
            </div>
        </div>
    </div>

    <script src="vendor/supabase.js"></script>
    <script src="config.js"></script>
    <script src="my-orders.js"></script>
    <script src="support-widget.js"></script>
</body>
</html>
