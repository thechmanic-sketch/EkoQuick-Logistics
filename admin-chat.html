<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>html{background:#0B0F16}</style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekoquick — Chat</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="app.css">
    <link rel="stylesheet" href="admin.css">
    <script src="transitions.js"></script>
    <style>
        .chat-layout { display: flex; height: calc(100vh - 160px); border: 1px solid var(--line); }
        .room-list { width: 300px; border-right: 1px solid var(--line); overflow-y: auto; flex-shrink: 0; }
        .room-item { padding: 10px 14px; border-bottom: 1px solid var(--line); cursor: pointer; }
        .room-item:hover, .room-item.active { background: rgba(255,255,255,0.05); }
        .room-item .name { font-weight: 600; font-size: 13px; }
        .room-item .last { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .room-item .meta { font-size: 10px; color: var(--muted); }
        .unread-dot { background: var(--orange); border-radius: 50%; width: 8px; height: 8px; display: inline-block; margin-left: 4px; }
        .chat-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .filter-row { display: flex; gap: 8px; flex-wrap: wrap; padding: 8px 12px; border-bottom: 1px solid var(--line); align-items: center; }
        .filter-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--line); color: #fff; border-radius: 8px; padding: 4px 10px; cursor: pointer; font-size: 12px; }
        .filter-btn.active { background: var(--blue,#3E8BFF); border-color: var(--blue,#3E8BFF); }
        #adminMessageArea { flex: 1; overflow-y: auto; padding: 10px 14px; }
        .msg-row { display: flex; margin: 4px 0; }
        .msg-row.customer { justify-content: flex-start; }
        .msg-row.driver { justify-content: flex-end; }
        .msg-row.system, .msg-row.admin { justify-content: center; }
        .bubble { max-width: 70%; border-radius: 10px; padding: 8px 10px; font-size: 13px; }
        .msg-row.customer .bubble { background: rgba(255,255,255,0.08); }
        .msg-row.driver .bubble { background: var(--blue,#3E8BFF); }
        .msg-row.system .bubble { background: rgba(255,255,255,0.05); color: var(--muted); font-size: 11px; }
        .msg-row.admin .bubble { background: rgba(30,142,62,0.15); border: 1px solid #1E8E3E; }
        .msg-meta { font-size: 10px; opacity: 0.7; margin-top: 3px; display:flex; gap:8px; }
        .msg-meta span[data-action] { cursor: pointer; text-decoration: underline; }
        .chat-input-row { display: flex; gap: 8px; padding: 8px 12px; border-top: 1px solid var(--line); }
        .chat-input-row input { flex: 1; }
        .empty-state { padding: 40px; text-align: center; color: var(--muted); }
    </style>
</head>
<body>
    <div class="cmd-shell">
        <aside class="cmd-sidebar">
            <div class="cmd-brand">Eko<span>quick</span></div>
            <div class="cmd-tag">Admin Command Center</div>
            <nav class="cmd-nav">
                <a href="admin-dashboard.html">Dashboard</a>
                <a href="admin-drivers.html">Drivers</a>
                <a href="admin-reviews.html">Reviews & Complaints</a>
                <a href="admin-jobs.html">All Jobs</a>
                <a href="admin-fleet-map.html">Live Fleet Map</a>
                <a href="admin-dispatch.html">Dispatch Center</a>
                <a href="admin-customers.html">Customers</a>
                <a href="admin-finances.html">Finances</a>
                <a href="admin-commissions.html">Commissions</a>
                <a href="admin-chat.html" class="active">Chat</a>
                <a href="admin-settings.html">Settings</a>
            </nav>
            <div class="cmd-sidebar-bottom">
                <button class="nav-logout" id="logoutBtn" style="width: 100%;">Log Out</button>
            </div>
        </aside>

        <main class="cmd-main">
            <div class="cmd-header">
                <div class="cmd-header-title">
                    <h1>Chat</h1>
                    <div class="cmd-breadcrumb">All customer/driver conversations across active deliveries</div>
                </div>
            </div>

            <div class="chat-layout">
                <div class="room-list">
                    <div style="padding:10px;"><input class="field-plain" id="roomSearch" placeholder="Search conversations..."></div>
                    <div class="filter-row">
                        <button class="filter-btn active" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="unread">Unread</button>
                        <button class="filter-btn" data-filter="pinned">Pinned</button>
                    </div>
                    <div id="roomListItems"></div>
                </div>

                <div class="chat-panel">
                    <div class="filter-row" style="justify-content: space-between;">
                        <span id="adminChatTitle">Select a conversation</span>
                        <span>
                            <button class="btn btn-outline-blue" id="exportBtn" style="width:auto; display:none;">Export</button>
                        </span>
                    </div>
                    <div id="adminMessageArea"><div class="empty-state">Select a conversation from the left to view messages.</div></div>
                    <div class="chat-input-row" id="adminInputRow" style="display:none;">
                        <input class="field-plain" id="adminMessageInput" placeholder="Reply as Admin...">
                        <button class="btn btn-blue" id="adminSendBtn" style="width:auto;">Send</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="vendor/supabase.js"></script>
    <script src="config.js"></script>
    <script src="admin-chat.js"></script>
</body>
</html>
